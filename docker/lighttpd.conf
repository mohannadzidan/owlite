server.modules = (
  "mod_proxy",
)

server.document-root = "/var/empty"
server.port           = 80
server.bind           = "0.0.0.0"

# Pass WebSocket upgrade headers through (required for socket.io)
proxy.header = ("upgrade" => "enable")

# Default: forward to the web SPA
proxy.server = ("" => (( "host" => "web", "port" => 3000 )))

# Route all /api/v1/ traffic (REST + socket.io WebSocket) to the Fastify API
$HTTP["url"] =~ "^/api/v1/" {
  proxy.server = ("" => (( "host" => "api", "port" => 8080 )))
}
