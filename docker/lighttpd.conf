server.modules = (
  "mod_proxy",
)

server.document-root = "/var/empty"
server.port           = 80
server.bind           = "0.0.0.0"

# Pass WebSocket upgrade headers through (required for socket.io)
proxy.header = ("upgrade" => "enable")

# Default: forward to Next.js
proxy.server = ("" => (( "host" => "nextjs", "port" => 3000 )))

# Route socket.io traffic (HTTP polling + WebSocket upgrades) to the Fastify API
$HTTP["url"] =~ "^/api/socket\.io" {
  proxy.server = ("" => (( "host" => "api", "port" => 8080 )))
}
