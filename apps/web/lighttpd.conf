server.modules += (
  "mod_rewrite",
  "mod_accesslog",
)

server.document-root = "/var/www/html"
server.port          = 3000

mimetype.assign = (
  ".html" => "text/html; charset=utf-8",
  ".css"  => "text/css",
  ".js"   => "application/javascript",
  ".json" => "application/json",
  ".svg"  => "image/svg+xml",
  ".png"  => "image/png",
  ".jpg"  => "image/jpeg",
  ".ico"  => "image/x-icon",
  ".woff2"=> "font/woff2",
  ".woff" => "font/woff",
  ""      => "application/octet-stream",
)

# SPA fallback: rewrite any non-asset request to index.html
url.rewrite-once = (
  "^/(.*)\.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|map|json)(\?.*)?$" => "/$0",
  "^/.*" => "/index.html",
)

accesslog.filename = "/dev/stdout"
server.errorlog    = "/dev/stderr"
