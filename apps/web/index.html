<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Owlite</title>
    <script>
      (function () {
        var e = document.createElement("div");
        e.style.cssText =
          "position:fixed;visibility:hidden;display:flex;flex-direction:column;row-gap:1px;";
        e.innerHTML = "<div></div><div></div>";
        document.documentElement.appendChild(e);
        if (e.scrollHeight !== 1) document.documentElement.classList.add("no-flex-gap");
        document.documentElement.removeChild(e);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
